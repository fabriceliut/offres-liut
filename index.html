<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf8f4" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#230f0a" />

    <!-- GitHub Pages SPA routing — decode path from query string -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            decoded[0].replace('p=', '/') +
            (decoded[1] ? '&' + decoded[1].replace('q=', '?') : '') +
            l.hash
          );
        }
      }(window.location));
    </script>

    <title>Offres — Fabrice Liut | Design Organisationnel pour PME &amp; PMI</title>
    <meta name="description" content="Fabrice Liut accompagne les dirigeants de PME et PMI (10–90 salariés) avec le Design Organisationnel et l'IA. Retour x4,5 observé. Basé à Lyon. Prenez 45 min." />
